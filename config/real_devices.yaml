# Each entry is one physical controller. `points` optional: omit to auto-discover
# the device's objectList on connect. Enumerated live via wildcard device read
# (these controllers answer ReadProperty but NOT Who-Is, so broadcast discovery
# finds nothing — they must be listed by IP here).
